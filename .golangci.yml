version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
  exclusions:
    rules:
      - text: 'SA1019: jsonrpc2\.PlainObjectCodec is deprecated'
        linters:
          - staticcheck

formatters:
  settings:
    goimports:
      local-prefixes:
        - github.com/builtwithtofu/ari
