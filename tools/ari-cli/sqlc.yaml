version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/globaldb/queries"
    schema: "migrations"
    gen:
      go:
        package: "dbsqlc"
        out: "internal/globaldb/dbsqlc"
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        query_parameter_limit: 0
